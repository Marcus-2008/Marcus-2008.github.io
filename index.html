<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus-2008 | 6ICW</title>
    <style>
        /* Basis stijl */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* GitHub dark mode kleur */
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container voor de content */
        .container {
            background-color: #161b22;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        h2 {
            color: #8b949e;
            font-weight: 400;
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 1rem;
        }

        p {
            line-height: 1.6;
            color: #8b949e;
        }

        .badge {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Een simpele animatie */
        .container {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Marcus-2008</h1>
        <h2>Klas: 6ICW</h2>
        <p>Welkom op mijn officiële GitHub-site. Dit is het begin van mijn online portfolio.</p>
        <div class="badge">Online</div>
    </div>

</body>
</html>
